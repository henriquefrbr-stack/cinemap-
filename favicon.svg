  <circle cx="18" cy="26" r="3.5" fill="#4e8eba" opacity="0.9"/><circle cx="18" cy="26" r="1.5" fill="#deeeff" opacity="0.7"/>
  <circle cx="55" cy="24" r="3.5" fill="#4e8eba" opacity="0.9"/><circle cx="55" cy="24" r="1.5" fill="#deeeff" opacity="0.7"/>
  <circle cx="92" cy="26" r="3.5" fill="#4e8eba" opacity="0.9"/><circle cx="92" cy="26" r="1.5" fill="#deeeff" opacity="0.7"/>
