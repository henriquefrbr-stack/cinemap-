<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgr" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#1c3550"/>
      <stop offset="100%" stop-color="#07080d"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d7aad"/>
    </linearGradient>
  </defs>
  <!-- Fundo circular com gradiente -->
  <circle cx="16" cy="16" r="16" fill="url(#bgr)"/>
  <!-- Corpo da fita -->
  <rect x="5" y="11.5" width="22" height="9" rx="2" fill="#1a2a3a"/>
  <!-- Área de exposição interna -->
  <rect x="8" y="11.5" width="16" height="9" fill="#0d1825" opacity="0.85"/>
  <!-- Furos esquerdos -->
  <rect x="5" y="13"   width="3" height="2.5" rx="0.7" fill="#07080d"/>
  <rect x="5" y="16.8" width="3" height="2.5" rx="0.7" fill="#07080d"/>
  <!-- Furos direitos -->
  <rect x="24" y="13"   width="3" height="2.5" rx="0.7" fill="#07080d"/>
  <rect x="24" y="16.8" width="3" height="2.5" rx="0.7" fill="#07080d"/>
  <!-- Borda da fita com brilho azul -->
  <rect x="5" y="11.5" width="22" height="9" rx="2" fill="none" stroke="url(#blue)" stroke-width="0.9" opacity="0.9"/>
  <!-- Halo do nó central -->
  <circle cx="16" cy="16" r="4.2" fill="#4e8eba" opacity="0.18"/>
  <!-- Nó central -->
  <circle cx="16" cy="16" r="2.8" fill="url(#blue)"/>
  <!-- Reflexo interno -->
  <circle cx="16" cy="16" r="1.1" fill="#deeeff" opacity="0.95"/>
</svg>
