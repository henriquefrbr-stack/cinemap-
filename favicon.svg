<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo arredondado -->
  <rect width="32" height="32" rx="7" fill="#090c12"/>
  <!-- Corpo da fita -->
  <rect x="2" y="7" width="28" height="18" rx="2.5" fill="#1a2a3a"/>
  <!-- Área de exposição -->
  <rect x="2" y="12" width="28" height="8" fill="#0d1520" stroke="#3d7aad" stroke-width="0.6"/>
  <!-- 3 furos superiores -->
  <rect x="4"   y="8.5" width="5" height="3.5" rx="1" fill="#090c12"/>
  <rect x="13.5" y="8.5" width="5" height="3.5" rx="1" fill="#090c12"/>
  <rect x="23"  y="8.5" width="5" height="3.5" rx="1" fill="#090c12"/>
  <!-- 3 furos inferiores -->
  <rect x="4"   y="20" width="5" height="3.5" rx="1" fill="#090c12"/>
  <rect x="13.5" y="20" width="5" height="3.5" rx="1" fill="#090c12"/>
  <rect x="23"  y="20" width="5" height="3.5" rx="1" fill="#090c12"/>
  <!-- Nó central -->
  <circle cx="16" cy="16" r="3.5" fill="#4e8eba"/>
  <circle cx="16" cy="16" r="1.4" fill="#deeeff"/>
</svg>
