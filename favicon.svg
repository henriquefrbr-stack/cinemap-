  <line x1="55" y1="45" x2="98" y2="45" stroke="rgba(78,142,186,0.5)" stroke-width="1"/>
  <line x1="55" y1="45" x2="18" y2="64" stroke="rgba(78,142,186,0.5)" stroke-width="1"/>
