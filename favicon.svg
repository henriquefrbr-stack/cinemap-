  <line x1="55" y1="45" x2="18" y2="26" stroke="rgba(78,142,186,0.5)" stroke-width="1"/>
  <line x1="55" y1="45" x2="55" y2="24" stroke="rgba(78,142,186,0.5)" stroke-width="1"/>
  <line x1="55" y1="45" x2="92" y2="26" stroke="rgba(78,142,186,0.5)" stroke-width="1"/>
